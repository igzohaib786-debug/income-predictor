<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Guess AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #111827;
            margin-bottom: 8px;
            font-weight: 600;
        }
        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline-color: #2563eb;
        }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .result-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #ecfdf5;
            border-radius: 8px;
            border: 1px solid #10b981;
        }
        .result-box h2 {
            margin: 0;
            font-size: 14px;
            color: #065f46;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .prediction-text {
            font-size: 24px;
            font-weight: 700;
            color: #059669;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Income Guess AI</h1>
        <p>Enter your years of experience to predict your potential income.</p>
        
        <form action="/predict" method="POST">
            <input type="number" name="feature" placeholder="Years (e.g. 10)" step="any" required>
            <button type="submit">Predict Potential Income</button>
        </form>

        {% if prediction %}
        <div class="result-box">
            <h2>Estimated Income</h2>
            <div class="prediction-text">${{ prediction }}</div>
        </div>
        {% endif %}
    </div>

</body>
</html>
